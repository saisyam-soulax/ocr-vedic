services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # Persist OCR results on the host so they survive container restarts/removal.
      - ./backend/data/uploads:/app/data/uploads

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  # dots.ocr via vLLM — load/unload from the UI (VLLM_ON_DEMAND=true).
  # Defaults assume GPU is SHARED with other jobs (low utilization + CPU offload).
  # For a dedicated GPU, set VLLM_GPU_MEMORY_UTILIZATION=0.45 in .env.
  vllm:
    build:
      context: ./deploy
      dockerfile: Dockerfile.vllm-dots
    image: ocr-vedic-vllm-dots:latest
    profiles:
      - vllm
    ipc: host
    shm_size: "32gb"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      # GB10 / Blackwell (sm_12.x): prebuilt FlashInfer lacks kernels → use PyTorch sampler
      VLLM_USE_FLASHINFER_SAMPLER: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - serve
      - rednote-hilab/dots.ocr
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --trust-remote-code
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-auto}"
      - --cpu-offload-gb
      - "${VLLM_CPU_OFFLOAD_GB:-16}"
      - --chat-template-content-format
      - string
      - --served-model-name
      - model
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-4096}"
      - --max-num-batched-tokens
      - "${VLLM_MAX_NUM_BATCHED_TOKENS:-2048}"
      - --dtype
      - bfloat16
      - --limit-mm-per-prompt
      - '{"image": 1}'
      - --enforce-eager
      # Skip KV memory profiling (fails when other GPU jobs release memory mid-init)
      - --kv-cache-memory-bytes
      - "${VLLM_KV_CACHE_MEMORY_BYTES:-536870912}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: "no"
