services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # Persist OCR results on the host so they survive container restarts/removal.
      - ./backend/data/uploads:/app/data/uploads

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  vllm:
    image: vllm/vllm-openai:gemma4-0505-cu130
    profiles:
      - vllm
    ipc: host
    shm_size: "16gb"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - nvidia/Gemma-4-31B-IT-NVFP4
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --max-model-len
      - "16384"
      # Allow a full batch of 8 concurrent pages (8 × ~560 image tokens + text headroom)
      - --max-num-batched-tokens
      - "16384"
      - --gpu-memory-utilization
      - "0.90"
      - --limit-mm-per-prompt
      - '{"image": 8, "audio": 0}'
      - --mm-processor-kwargs
      - '{"max_soft_tokens": 560}'
      # Cache the system-prompt KV across all pages — biggest throughput win
      - --enable-prefix-caching
      # Better GPU utilisation for mixed image+text batch sizes
      - --enable-chunked-prefill
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    # "no" so the backend (VLLM_ON_DEMAND) owns start/stop; docker stop won't
    # be countered by an auto-restart from the daemon.
    restart: "no"
