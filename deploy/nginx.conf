server {
    listen 80;
    # Responds to the bare IP, the mDNS hostname (.local), and any custom
    # alias you point at this machine (e.g. via /etc/hosts on a client).
    server_name _ spark-9d9c.local spark-9d9c vedic-ocr vedic-ocr.local;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500m;

    # App lives at http://<host>/ocr/
    location = / {
        return 302 /ocr/;
    }

    location = /ocr {
        return 301 /ocr/;
    }

    location /ocr/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location = /ocr/health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 900s;
    }

    location /ocr/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /ocr/index.html;
    }
}
